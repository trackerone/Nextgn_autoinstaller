name: Install Simulation

on:
  push:
  pull_request:

jobs:
  install-simulation:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck unzip nginx

      - name: Run installer simulation suite
        timeout-minutes: 12
        run: bash tests/test_install_simulation.sh

      - name: Build and verify release artifacts
        timeout-minutes: 8
        run: |
          bash scripts/release.sh
          bash scripts/verify-release.sh

      - name: Validate extracted package self-tests
        timeout-minutes: 5
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          WORK_DIR="$(mktemp -d)"
          tar -xzf "dist/nextgn-installer-v${VERSION}.tar.gz" -C "${WORK_DIR}"
          unzip -q "dist/nextgn-installer-v${VERSION}.zip" -d "${WORK_DIR}"
          for pkg in "${WORK_DIR}/nextgn-installer-v${VERSION}"; do
            (cd "${pkg}" && bash scripts/self-test.sh && bash scripts/verify-release.sh)
          done

      - name: Upload install simulation diagnostics
        if: failure()
        run: |
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/.simulation-artifacts"
          mkdir -p "${ARTIFACT_DIR}"/{logs,configs,support,simulation}

          cp -f /tmp/nextgn-installer.log "${ARTIFACT_DIR}/logs/" 2>/dev/null || true
          cp -f /tmp/*/installer.log "${ARTIFACT_DIR}/logs/" 2>/dev/null || true
          cp -f /tmp/*/install/deploy/*.yml "${ARTIFACT_DIR}/configs/" 2>/dev/null || true
          cp -f /tmp/*/install/deploy/*.conf "${ARTIFACT_DIR}/configs/" 2>/dev/null || true
          cp -f /tmp/nextgn-support-*.tar.gz "${ARTIFACT_DIR}/support/" 2>/dev/null || true
          cp -f tests/logs/* "${ARTIFACT_DIR}/simulation/" 2>/dev/null || true

      - name: Upload install simulation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-simulation-${{ matrix.os }}
          path: .simulation-artifacts/**
          if-no-files-found: ignore
