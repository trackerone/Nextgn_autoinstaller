name: Installer CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          bash -n installer/nextgn-install.sh installer/lib/*.sh tests/*.sh scripts/*.sh

      - name: ShellCheck
        run: |
          shellcheck installer/nextgn-install.sh installer/lib/*.sh tests/*.sh scripts/*.sh

      - name: Argument tests
        run: bash tests/test_args.sh

      - name: Installer behaviour tests
        run: bash tests/test_installer_behaviour.sh

      - name: Install simulation tests
        run: bash tests/test_install_simulation.sh

      - name: Validate VPS tests
        run: bash tests/test_validate_vps.sh
