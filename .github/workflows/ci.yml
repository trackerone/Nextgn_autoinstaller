name: Installer CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          bash -n installer/nextgn-install.sh
          bash -n installer/lib/*.sh
          bash -n tests/*.sh
      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck installer/nextgn-install.sh installer/lib/*.sh tests/*.sh
      - name: Argument tests
        run: bash tests/test_args.sh
