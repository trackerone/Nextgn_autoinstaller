version: '3.9'

services:
  app:
    image: ghcr.io/your-org/nextgn-tracker:latest
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nextgn
      MYSQL_USER: nextgn
      MYSQL_PASSWORD: change_me
      MYSQL_ROOT_PASSWORD: change_me
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  mysql-data:
